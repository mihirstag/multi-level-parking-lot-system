<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Park Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --primary: #66fcf1;
            --secondary: #45a29e;
            --surface: rgba(30, 31, 38, 0.6);
            --text-main: #ffffff;
            --text-muted: #8b8e98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(102, 252, 241, 0.08), transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(69, 162, 158, 0.08), transparent 40%);
        }
        
        /* Glass Navbar (Unified) */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 6%; 
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 10px;}
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 40px; font-size: 15px; font-weight: 500;}
        .nav-links a { color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-actions { display: flex; gap: 15px; align-items: center;}
        
        .main-content { display: flex; align-items: center; justify-content: center; padding: 60px 20px; min-height: calc(100vh - 80px); }
        
        .auth-container { 
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px; border-radius: 24px; max-width: 440px; width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
        }

        h2 { font-size: 28px; font-weight: 700; margin-bottom: 10px; text-align: center;}
        p.subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; text-align: center; }

        .form-group { margin-bottom: 24px; position: relative;}
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        .form-control { 
            width: 100%; padding: 16px; border-radius: 12px; 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            color: white; font-size: 15px; transition: 0.3s; outline: none;
        }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(102, 252, 241, 0.1); }

        .btn-submit { 
            display: block; width: 100%; padding: 18px; margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: var(--bg-color); border: none; border-radius: 12px; cursor: pointer; 
            font-size: 16px; font-weight: 700; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(102, 252, 241, 0.2); 
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(102, 252, 241, 0.3); }

        .auth-links { margin-top: 30px; text-align: center; font-size: 14px; color: var(--text-muted); }
        .auth-links a { color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 5px; }
        .auth-links a:hover { text-decoration: underline; }

        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center; }
        .alert-error { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }
        .alert-success { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
    </style>
</head>
<body>

    <!-- Unified Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">Park<span> Manager</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="#">Locations</a>
        </div>
        <div class="nav-actions">
            <a href="/register" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create Account</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="auth-container">
            <h2>Welcome back</h2>
        <p class="subtitle">Enter your details to access your portal</p>

        <div th:if="${param.error != null}" class="alert alert-error">Invalid email or password. Please try again.</div>
        <div th:if="${param.registered != null}" class="alert alert-success">Registration successful! You may now sign in.</div>

        <form action="/process-login" method="post">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" autocomplete="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn-submit">Sign In</button>
            
            <div class="auth-links">
                Don't have an account? <a href="/register">Sign up footprint</a>
            </div>
        </form>
    </div>

</body>
</html>
