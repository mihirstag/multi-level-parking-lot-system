<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful - Park Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(30, 31, 38, 0.6);
            --primary-accent: #66fcf1;
            --secondary-accent: #45a29e;
            --text-main: #ffffff;
            --text-muted: #c5c6c7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 10%, rgba(69, 162, 158, 0.15), transparent 60%);
        }
        /* Glass Navbar (Unified) */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 6%; 
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--text-main); text-decoration: none;}
        .logo span { color: var(--primary-accent); }
        .nav-links { display: flex; gap: 40px; font-size: 15px; font-weight: 500;}
        .nav-links a { color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-accent); }
        .nav-actions { display: flex; gap: 15px; align-items: center;}
        
        .main-content { display: flex; align-items: center; justify-content: center; padding: 60px 20px; min-height: calc(100vh - 80px); }

        .success-card { 
            background: rgba(30, 31, 38, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px; border-radius: 24px; max-width: 500px; width: 100%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
        }

        .pay-btn { 
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent)); 
            color: var(--bg-color); border: none; padding: 18px; font-size: 16px; font-weight: 700; 
            border-radius: 12px; cursor: pointer; width: 100%; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(102, 252, 241, 0.2);
            text-decoration: none;
            display: inline-block;
        }
        .pay-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(102, 252, 241, 0.3); }
        
        .success-icon { font-size: 80px; color: var(--primary-accent); margin-bottom: 20px; }
        
        h2 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
        
        .message { 
            font-size: 16px; color: var(--text-main); margin-bottom: 30px; line-height: 1.6; 
        }
        
        .btn-large {
            width: 100%;
            max-width: 320px;
            display: inline-block;
            text-align: center;
            padding: 18px 30px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(102, 252, 241, 0.2);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: var(--bg-color);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(102, 252, 241, 0.35);
            color: var(--text-main);
            font-weight: 600;
        }
        .btn-secondary:hover {
            background: rgba(102, 252, 241, 0.12);
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.25);
        }
    </style>
</head>
<body>

    <!-- Unified Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">Park<span> Manager</span></a>
        <div class="nav-links">
            <a href="/dashboard/driver">Dashboard</a>
            <a href="/bookings">My Bookings</a>
            <a href="/spots">Live Map</a>
        </div>
        <div class="nav-actions">
            <span style="font-size: 14px; color: var(--text-muted); font-weight: 500;" th:text="${session.userEmail}"></span>
        </div>
    </nav>

    <div class="main-content">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2>Payment Successful!</h2>
            <div class="message">
                <p>Your parking reservation has been confirmed and paid for successfully.</p>
                <p>You can now proceed to your designated parking spot. The gate will open automatically when you arrive.</p>
            </div>
            <div class="button-group">
                <a href="/dashboard/driver" class="pay-btn">Go to Dashboard</a>
                <a href="/bookings" class="pay-btn">View My Bookings</a>
            </div>
        </div>
    </div>

</body>
</html>
