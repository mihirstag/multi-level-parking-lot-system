<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Live Parking Map</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; padding-bottom: 100px; }
        .floor-container { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; margin-top: 15px; }
        
        /* Spot Buttons */
        .spot-btn { 
            border: 2px solid transparent; padding: 15px 5px; text-align: center; border-radius: 6px; 
            font-weight: bold; font-size: 11px; color: white; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .spot-btn:hover:not(:disabled) { transform: scale(1.05); }
        
        /* Status Colors */
        .AVAILABLE { background-color: #2ecc71; } 
        .RESERVED { background-color: #e74c3c; color: white; cursor: pointer; opacity: 1;} 
        .RESERVED:hover { background-color: #c0392b; transform: scale(1.05); }
        .OCCUPIED { background-color: #34495e; color: #ecf0f1; cursor: not-allowed; opacity: 0.85; }
        
        /* New Selected State */
        .SELECTED { border: 3px solid #2c3e50; transform: scale(1.05); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        /* Modal Overlay */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 400px; text-align: center; color: #2c3e50; }
        .modal-box h3 { margin-bottom: 10px; color: #e74c3c; font-size: 18px; }
        .modal-box p { margin-bottom: 20px; color: #666; font-size: 14px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .pay-btn { background: #2ecc71; color: white; }
        .pay-btn:hover { background: #27ae60; }
        .close-btn { background: #bdc3c7; color: white; }
        .close-btn:hover { background: #95a5a6; }
        
        .nav-btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #34495e; color: white; text-decoration: none; border-radius: 5px; }
        h1 { color: #2c3e50; margin-bottom: 5px;}
        
        /* Sticky Bottom Checkout Bar (Hidden by default) */
        .checkout-cart {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #2c3e50; color: white;
            padding: 20px 50px; display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2); z-index: 1000;
        }
        .cart-info { font-size: 18px; font-weight: bold; }
        .cart-controls { display: flex; gap: 20px; align-items: center; }
        .cart-controls label { font-size: 14px; }
        .cart-controls input { padding: 8px; border-radius: 5px; border: none; width: 80px; text-align: center; font-weight: bold;}
        .btn-checkout { background: #e67e22; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;}
        .btn-checkout:hover { background: #d35400; }
    </style>
</head>
<body>

    <a href="/dashboard/driver" class="nav-btn">← Back to Dashboard</a>
    
    <h1>Live Parking Map</h1>
    <p style="color: #666; margin-bottom: 25px;">Select one or more available spots to reserve your time block.</p>

    <div th:each="floor : ${floors}" class="floor-container">
        <h2 th:text="'Floor ' + ${floor.floorNumber}">Floor X</h2>
        
        <div class="grid">
            <div th:each="spot : ${floor.spots}">
                
                <button type="button" 
                        th:if="${spot.status.name() == 'AVAILABLE'}" 
                        class="spot-btn AVAILABLE" 
                        th:text="${spot.id}"
                        th:attr="onclick=|toggleSpot('${spot.id}', this)|">
                </button>

                <button type="button" 
                        th:if="${spot.status.name() == 'RESERVED'}" 
                        class="spot-btn RESERVED" 
                        th:text="${spot.id} + ' (Booked)'"
                        th:attr="onclick=|openPaymentModal('${spot.id}')|">
                </button>

                <button type="button" 
                        th:if="${spot.status.name() == 'OCCUPIED'}" 
                        class="spot-btn OCCUPIED" 
                        th:text="${spot.id} + ' (Paid)'" disabled>
                </button>

            </div>
        </div>
    </div>

    <div class="checkout-cart" id="checkout-cart">
        <div class="cart-info">
            Spots Selected: <span id="spot-count">0</span>
            <div style="font-size: 12px; color: #bdc3c7; font-weight: normal; margin-top: 5px;" id="spot-list"></div>
        </div>
        
        <form action="/checkout" method="post" class="cart-controls">
            <input type="hidden" name="selectedSpots" id="selected-spots-input" required>
            
            <div>
                <label for="hours">Duration (Hours): </label>
                <input type="number" name="hours" id="hours" min="1" max="24" value="1" required>
            </div>
            
            <button type="submit" class="btn-checkout">Proceed to Checkout</button>
        </form>
    </div>
    
    <!-- Modal for Payment -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal-box">
            <h3 id="modalSpotId">Spot F1-C1</h3>
            <p>This spot is already reserved. Complete the payment now to finalize your booking.</p>
            <div class="modal-buttons">
                <button class="modal-btn pay-btn" onclick="proceedToPayment()">💳 Pay Now</button>
                <button class="modal-btn close-btn" onclick="closePaymentModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        let selectedSpots = [];
        let currentReservedSpot = '';

        function toggleSpot(spotId, btnElement) {
            const index = selectedSpots.indexOf(spotId);
            
            // If already selected, remove it
            if (index > -1) {
                selectedSpots.splice(index, 1);
                btnElement.classList.remove('SELECTED');
            } 
            // If not selected, add it
            else {
                selectedSpots.push(spotId);
                btnElement.classList.add('SELECTED');
            }
            
            updateCart();
        }

        function updateCart() {
            const cart = document.getElementById('checkout-cart');
            const countSpan = document.getElementById('spot-count');
            const listDiv = document.getElementById('spot-list');
            const hiddenInput = document.getElementById('selected-spots-input');

            if (selectedSpots.length > 0) {
                cart.style.display = 'flex'; // Show the bar
                countSpan.innerText = selectedSpots.length;
                listDiv.innerText = selectedSpots.join(', ');
                
                // Joins array into a comma-separated string for Spring Boot to read
                hiddenInput.value = selectedSpots.join(','); 
            } else {
                cart.style.display = 'none'; // Hide the bar if empty
            }
        }
        
        function openPaymentModal(spotId) {
            currentReservedSpot = spotId;
            document.getElementById('modalSpotId').innerText = 'Spot ' + spotId;
            document.getElementById('paymentModal').classList.add('active');
        }
        
        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            currentReservedSpot = '';
        }
        
        function proceedToPayment() {
            // Redirect to payment page with reserved spot details
            const hours = document.getElementById('hours').value || 1;
            const fee = hours * 50; // Default calculation
            
            window.location.href = "/payment?spots=" + encodeURIComponent(currentReservedSpot) + "&hours=" + hours + "&fee=" + fee;
        }
        
        // Close modal when clicking outside the box
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('paymentModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closePaymentModal();
                }
            });
        });
    </script>
</body>
</html>
