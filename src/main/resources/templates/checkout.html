<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secure Checkout - Park Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(30, 31, 38, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #66fcf1;
            --secondary-accent: #45a29e;
            --primary-glow: rgba(102, 252, 241, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b8e98;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 10%, rgba(69, 162, 158, 0.15), transparent 60%);
        }
        /* Glass Navbar (Unified) */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 6%; 
            background: rgba(11, 12, 16, 0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--text-main); text-decoration: none;}
        .logo span { color: var(--primary-accent); }
        .nav-links { display: flex; gap: 40px; font-size: 15px; font-weight: 500;}
        .nav-links a { color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary-accent); }
        .nav-actions { display: flex; gap: 15px; align-items: center;}
        
        .main-content { display: flex; align-items: center; justify-content: center; padding: 60px 20px; min-height: calc(100vh - 80px); }

        .checkout-card { 
            background: rgba(30, 31, 38, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 50px; border-radius: 24px; max-width: 450px; width: 100%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
        }
        
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        
        .price-box {
            padding: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px;
        }
        .price { font-size: 56px; color: var(--primary-accent); font-weight: 800; line-height: 1; letter-spacing: -2px;}
        .price span { font-size: 24px; vertical-align: super; }
        
        .spot-details { 
            font-size: 15px; color: var(--text-main); margin-bottom: 30px; line-height: 1.6; 
            background: rgba(0,0,0,0.2); padding: 20px; border-radius: 16px; text-align: left;
        }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .detail-row:last-child { margin-bottom: 0; padding-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1); color: var(--text-muted); font-size: 13px;}
        .mapping-list {
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }
        .mapping-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 13px;
            color: var(--text-main);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 10px;
        }
        
        .pay-btn { 
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent)); 
            color: var(--bg-color); border: none; padding: 18px; font-size: 16px; font-weight: 700; 
            border-radius: 12px; cursor: pointer; width: 100%; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(102, 252, 241, 0.2);
        }
        .pay-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(102, 252, 241, 0.3); }
        
        .cancel-link { display: inline-block; margin-top: 25px; color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s;}
        .cancel-link:hover { color: white; }
    </style>
</head>
<body>

    <!-- Unified Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">Park<span> Manager</span></a>
        <div class="nav-links">
            <a href="/dashboard/driver">Dashboard</a>
            <a href="/bookings">My Bookings</a>
            <a href="/spots">Live Map</a>
        </div>
        <div class="nav-actions">
            <span style="font-size: 14px; color: var(--text-muted); font-weight: 500;" th:text="${session.userEmail}"></span>
        </div>
    </nav>

    <div class="main-content">
        <div class="checkout-card">
            <h2>Complete Reservation</h2>
        
        <div class="price-box">
            <div class="price"><span>₹</span><span th:text="${fee}" style="font-size: inherit; vertical-align: baseline;"></span></div>
            <div style="font-size: 14px; color: var(--text-muted); margin-top: 10px; font-weight: 500;">Total Amount Due</div>
        </div>
        
        <div class="spot-details">
            <div class="detail-row">
                <span style="color: var(--text-muted);">Spots Reserved</span>
                <strong th:text="${spotCount}"></strong>
            </div>
            <div class="detail-row">
                <span style="color: var(--text-muted);">Duration</span>
                <strong><span th:text="${hours}"></span> hr(s)</strong>
            </div>
            <div class="detail-row">
                <span>Slot IDs</span>
                <span th:text="${selectedSpots}"></span>
            </div>
            <div class="detail-row">
                <span>Vehicle Type</span>
                <span th:text="${vehicleType}"></span>
            </div>
            <div class="mapping-list">
                <div class="mapping-item" th:each="selection : ${selections}">
                    <span th:text="${selection.spotId}">F1-C1</span>
                    <strong th:text="${selection.vehicleId}">KA01AB1234</strong>
                </div>
            </div>
        </div>
        
        <form th:action="@{/payment}" method="post">
            <th:block th:each="selection : ${selections}">
                <input type="hidden" name="spotIds" th:value="${selection.spotId}" />
                <input type="hidden" name="vehicleIds" th:value="${selection.vehicleId}" />
            </th:block>
            <input type="hidden" name="vehicleType" th:value="${vehicleType}" />
            <input type="hidden" name="hours" th:value="${hours}" />
            <button type="submit" class="pay-btn">Confirm & Pay Using Secure Gateway</button>
        </form>
        
        <a href="/spots" class="cancel-link">Cancel and return to map</a>
    </div>
    </div>

</body>
</html>
