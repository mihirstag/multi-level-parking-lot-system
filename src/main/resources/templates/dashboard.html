<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Parking Lot System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; text-align: center; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h1 th:text="${systemName}">Placeholder Title</h1>
        <p th:text="${welcomeMessage}">Placeholder Message</p>
        
        <div th:if="${param.payment != null}" style="background-color: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-bottom: 15px; border: 1px solid #c3e6cb;">
            Payment Successful! Your spot has been released.
        </div>
        
        <br>
        <button class="btn" onclick="window.location.href='/spots'">View Available Spots</button>
    </div>

</body>
</html>
